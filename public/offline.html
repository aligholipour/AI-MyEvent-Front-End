<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ED1C24" />
    <title>MyEvent - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f4f6;
        color: #111827;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(420px, calc(100vw - 48px));
        text-align: center;
        background: #fff;
        border-radius: 8px;
        padding: 32px 24px;
        box-shadow: 0 24px 60px rgb(15 23 42 / 12%);
      }

      .mark {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        border-radius: 20px;
        display: grid;
        place-items: center;
        background: #ED1C24;
        color: #fff;
        font-size: 32px;
        font-weight: 900;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }

      p {
        margin: 0;
        color: #6b7280;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">H</div>
      <h1>اتصال اینترنت برقرار نیست</h1>
      <p>بعد از وصل شدن اینترنت، دوباره برنامه را باز کنید یا صفحه را تازه‌سازی کنید.</p>
    </main>
  </body>
</html>
